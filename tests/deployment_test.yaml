# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: deployment scaling
templates:
  - deployment.yml
  - hpa.yml
tests:
  - it: should omit deployment annotations by default
    template: deployment.yml
    asserts:
      - isKind:
          of: Deployment
      - notExists:
          path: metadata.annotations

  - it: should render deployment annotations when commonAnnotations is specified
    template: deployment.yml
    set:
      commonAnnotations:
        test: value
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.annotations
          value:
            test: value

  - it: should render deployment annotations when deploymentAnnotations is specified
    template: deployment.yml
    set:
      deploymentAnnotations:
        test: value
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.annotations
          value:
            test: value

  - it: should render deployment annotations when commonAnnotations and deploymentAnnotations are specified
    template: deployment.yml
    set:
      commonAnnotations:
        value: test
      deploymentAnnotations:
        test: value
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.annotations
          value:
            value: test
            test: value

  - it: should render deployment labels when deploymentLabels is specified
    template: deployment.yml
    set:
      deploymentLabels:
        test: value
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.labels["test"]
          value: value

  - it: should render deployment replicas from replicas when autoscaling is disabled
    template: deployment.yml
    set:
      replicas: 4
      horizontalAutoscaler.enabled: false
      horizontalAutoscaler.minReplicas: 2
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 4

  - it: should omit deployment replicas and keep hpa minReplicas when autoscaling is enabled
    set:
      replicas: 4
      horizontalAutoscaler.enabled: true
      horizontalAutoscaler.minReplicas: 2
      horizontalAutoscaler.maxReplicas: 5
    template: deployment.yml
    asserts:
      - isKind:
          of: Deployment
      - notExists:
          path: spec.replicas

  - it: should render hpa minReplicas when autoscaling is enabled
    set:
      horizontalAutoscaler.enabled: true
      horizontalAutoscaler.minReplicas: 2
      horizontalAutoscaler.maxReplicas: 5
    template: hpa.yml
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 5

  - it: should omit dnsConfig by default
    template: deployment.yml
    asserts:
      - notExists:
          path: spec.template.spec.dnsConfig

  - it: should render dnsConfig options when specified via values
    template: deployment.yml
    set:
      dnsConfig:
        options:
          - name: ndots
            value: "1"
        searches:
          - cluster.home.arpa
          - home.arpa
    asserts:
      - equal:
          path: spec.template.spec.dnsConfig
          value:
            options:
              - name: ndots
                value: "1"
            searches:
              - cluster.home.arpa
              - home.arpa

  - it: should render dnsPolicy by default
    template: deployment.yml
    asserts:
      - equal:
          path: spec.template.spec.dnsPolicy
          value: ClusterFirst

  - it: should render dnsPolicy when specified via values
    template: deployment.yml
    set:
      dnsPolicy: ClusterFirstWithHostNet
    asserts:
      - equal:
          path: spec.template.spec.dnsPolicy
          value: ClusterFirstWithHostNet
